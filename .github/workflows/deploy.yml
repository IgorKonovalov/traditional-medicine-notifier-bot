name: Deploy

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# Never let two deploys overlap — a second `docker compose up --build` racing
# the first can leave a half-built image or a stale container running.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # pnpm/action-setup reads the pinned version from package.json's
      # `packageManager` field; it must run before setup-node so `cache: pnpm`
      # can find pnpm on PATH.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run lint
      # Compile to dist/ so emit-only TS errors (which `--noEmit` typecheck can
      # miss) fail CI rather than the droplet build.
      - run: pnpm run build
      - run: pnpm test

  deploy:
    needs: check
    runs-on: ubuntu-latest
    # Push to master/main only — never on pull_request, where `check` still runs
    # as the merge gate but nothing should reach the server.
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            set -e
            cd ~/bots/traditional-medicine-notifier-bot
            git pull --ff-only
            docker compose up -d --build
            docker image prune -f
