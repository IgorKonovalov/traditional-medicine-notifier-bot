services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - bot-data:/app/data
      - ${HOST_BACKUP_DIR:-/var/backups/traditional-medicine-notifier-bot}:/var/backups/traditional-medicine-notifier-bot
    # Heartbeat-file liveness probe (the bot has no HTTP port). Mirrors the
    # Dockerfile HEALTHCHECK; declared here so the policy is visible at the
    # compose layer too. `docker compose ps` reports health.
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "const fs=require('fs'),p=require('path');const f=p.join(p.dirname(process.env.DB_PATH||'./data/tm-bot.db'),'heartbeat');process.exit(Date.now()-fs.statSync(f).mtimeMs<120000?0:1)"
      interval: 60s
      timeout: 10s
      start_period: 40s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

volumes:
  bot-data:
